name: SmallCuts
options:
  bundleIdPrefix: com.macayaven
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  ENABLE_USER_SCRIPT_SANDBOXING: "YES"
  LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"
  ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"

packages:
  # Mirrors AeroWing's reference (remote pin, not the local clone — the local
  # repo's HEAD has no Package.swift; only release tags ship the SPM manifest).
  meta-wearables-dat-ios:
    url: https://github.com/facebook/meta-wearables-dat-ios
    from: 0.7.0

targets:
  SmallCuts:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SmallCuts
    info:
      path: SmallCuts/Info.plist
      properties:
        CFBundleDisplayName: "Small Cuts"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # --- MWDAT transport-discovery contract (Bug 3; copied from AeroWing) ---
        NSBluetoothAlwaysUsageDescription: "Small Cuts uses Bluetooth to discover and stream video from your Meta Ray-Ban glasses."
        NSBluetoothPeripheralUsageDescription: "Small Cuts uses Bluetooth to discover and stream video from your Meta Ray-Ban glasses."
        NSCameraUsageDescription: "Small Cuts streams the camera on your Meta Ray-Ban glasses to capture moments."
        NSLocalNetworkUsageDescription: "Small Cuts uses the local network to establish a high-bandwidth transport with your Meta Ray-Ban glasses."
        # Demo transport: the capture/write path is a private Tailnet WebSocket
        # to the Mac Studio engine. Keep ATS open only for local networking and
        # the Mac Studio MagicDNS host; the public viewer path remains HTTPS.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            mac-studio.tail48bab7.ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
            mac-studio:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
        NSBonjourServices:
          - "_meta-wearables._tcp"
          - "_meta-wearables._udp"
        UISupportedExternalAccessoryProtocols:
          - com.meta.ar.wearable
        LSApplicationQueriesSchemes:
          - fb-viewapp
        UIBackgroundModes:
          - bluetooth-central
          - bluetooth-peripheral
          - external-accessory
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - smallcuts
        # Camera-only app: MWDAT.DAMEnabled deliberately omitted (Bug 4 — that key
        # is only for the Display capability).
        #
        # CREDENTIALS — verified against the working AeroWing app (2026-06-12):
        # - MetaAppID "0" is the documented dev-mode value (on-device KB note).
        # - AeroWing does NOT ship a literal ClientToken: it injects
        #   $(MWDAT_CLIENT_TOKEN) from a gitignored xcconfig whose placeholder
        #   shows the pattern "AR|<meta-app-id>|<token>" — a Wearables Developer
        #   Center credential tied to that app's Meta App ID, so its value
        #   cannot be reused here.
        # TODO(LOUD, hardware runbook): if on-device registration fails with
        # MetaAppID "0" / empty ClientToken, mint a WDC app id + client token
        # for bundle id com.macayaven.smallcuts and fill both keys in
        # (ClientToken format: "AR|<meta-app-id>|<token>").
        MWDAT:
          AppLinkURLScheme: "smallcuts://"
          MetaAppID: "0"
          ClientToken: ""
    dependencies:
      - package: meta-wearables-dat-ios
        product: MWDATCore
      - package: meta-wearables-dat-ios
        product: MWDATCamera
      # Linked in all configs for simplicity; only imported under #if DEBUG.
      - package: meta-wearables-dat-ios
        product: MWDATMockDevice
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_BUNDLE_IDENTIFIER: com.macayaven.smallcuts
      CODE_SIGN_STYLE: Automatic
      ENABLE_PREVIEWS: YES
      SWIFT_VERSION: "5.0"
      SWIFT_EMIT_LOC_STRINGS: "YES"
      STRING_CATALOG_GENERATE_SYMBOLS: "YES"
      TARGETED_DEVICE_FAMILY: "1"
      MARKETING_VERSION: 0.1.0
      CURRENT_PROJECT_VERSION: 1

  SmallCutsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SmallCutsTests
    dependencies:
      - target: SmallCuts
      - package: meta-wearables-dat-ios
        product: MWDATCore
    settings:
      SWIFT_VERSION: "5.0"
      SWIFT_EMIT_LOC_STRINGS: "YES"
      STRING_CATALOG_GENERATE_SYMBOLS: "YES"
      GENERATE_INFOPLIST_FILE: YES

  # --- Small Cuts Lite (record → Modal upload) -----------------------------
  # A separate app/target from SmallCuts. It NEVER edits the real-time streaming
  # files (CaptureCoordinator / ContentView / EngineSessionClient); it records a
  # finished clip and POSTs it to the deployed Modal /v1/cuts endpoint, exactly
  # like the Gradio upload feature. The glasses path REUSES (shares, never edits)
  # the proven DAT pipeline files from the SmallCuts target.
  SmallCutsLite:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SmallCutsLite
        excludes:
          - "Config/Secrets.example.swift"
      # Shared (read-only) DAT pipeline files reused from the SmallCuts target.
      - path: SmallCuts/Capture/FrameSource.swift
      - path: SmallCuts/Capture/GlassesFrameSource.swift
      - path: SmallCuts/Glasses/GlassesSessionController.swift
      - path: SmallCuts/App/WearablesConfigurator.swift
    info:
      path: SmallCutsLite/Info.plist
      properties:
        CFBundleDisplayName: "Small Cuts Lite"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Small Cuts Lite records short clips from your phone camera and your Meta Ray-Ban glasses."
        NSMicrophoneUsageDescription: "Small Cuts Lite records audio together with your clips."
        NSBluetoothAlwaysUsageDescription: "Small Cuts Lite uses Bluetooth to discover and stream video from your Meta Ray-Ban glasses."
        NSBluetoothPeripheralUsageDescription: "Small Cuts Lite uses Bluetooth to discover and stream video from your Meta Ray-Ban glasses."
        NSLocalNetworkUsageDescription: "Small Cuts Lite uses the local network for a high-bandwidth transport with your Meta Ray-Ban glasses."
        NSBonjourServices:
          - "_meta-wearables._tcp"
          - "_meta-wearables._udp"
        UISupportedExternalAccessoryProtocols:
          - com.meta.ar.wearable
        LSApplicationQueriesSchemes:
          - fb-viewapp
        UIBackgroundModes:
          - bluetooth-central
          - bluetooth-peripheral
          - external-accessory
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - smallcutslite
        MWDAT:
          AppLinkURLScheme: "smallcutslite://"
          MetaAppID: "0"
          ClientToken: ""
    dependencies:
      - package: meta-wearables-dat-ios
        product: MWDATCore
      - package: meta-wearables-dat-ios
        product: MWDATCamera
      - package: meta-wearables-dat-ios
        product: MWDATMockDevice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macayaven.smallcutslite
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ZYJ38YVC5F
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  SmallCutsLiteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SmallCutsLiteTests
    dependencies:
      - target: SmallCutsLite
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SmallCuts:
    build:
      targets:
        SmallCuts: all
        SmallCutsTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SmallCutsTests
  SmallCutsLite:
    build:
      targets:
        SmallCutsLite: all
        SmallCutsLiteTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SmallCutsLiteTests
